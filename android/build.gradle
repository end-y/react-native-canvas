buildscript {
  ext.Canvas = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return Canvas[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.canvas"

  compileSdkVersion getExtOrDefault("compileSdkVersion")
  ndkVersion "27.1.12297006"

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
    ndk {
      // Skia shipped for arm64-v8a (devices / Apple-Silicon emulators) and x86_64 (Intel emulators).
      abiFilters "arm64-v8a", "x86_64"
    }
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
      version "3.22.1"
    }
  }

  buildFeatures {
    buildConfig true
    // Consume React Native's prefab modules (jsi) from the CMake build.
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  // For the CallInvokerHolder prefab consumed by CMake (frame loop threading).
  implementation "com.facebook.fbjni:fbjni:0.7.0"
}
